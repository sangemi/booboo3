name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-booboo3
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/sangemi/booboo3:latest

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://booboo3_user:placeholder@localhost:5432/booboo3

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://booboo3_user:placeholder@localhost:5432/booboo3
          AUTH_SECRET: ci-placeholder-secret
          AUTH_URL: http://localhost:4610

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u sangemi --password-stdin
            docker pull ${{ env.IMAGE }}

            docker run --rm \
              --env-file /home/ec2-user/servers/booboo3/.env \
              --add-host=host.docker.internal:host-gateway \
              ${{ env.IMAGE }} \
              pnpm prisma migrate deploy

            docker stop booboo3 2>/dev/null || true
            docker rm booboo3 2>/dev/null || true
            docker run -d \
              --name booboo3 \
              --restart unless-stopped \
              --env-file /home/ec2-user/servers/booboo3/.env \
              --add-host=host.docker.internal:host-gateway \
              -p 127.0.0.1:4610:4610 \
              ${{ env.IMAGE }}

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4610/ >/dev/null; then
                exit 0
              fi
              sleep 2
            done

            docker logs --tail=120 booboo3 || true
            exit 1
